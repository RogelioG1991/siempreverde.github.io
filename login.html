<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Portal de Redirección</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fuente elegante para textos de boda -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    .boda-text {
      font-family: "Great Vibes", cursive;
      font-size: 42px;
      color: #7a4b2a;
      text-align: center;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.25);
    }

    @media (max-width: 640px) {
      .boda-text {
        font-size: 32px;
      }

      body {
        background-size: contain;
        background-position: top;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-color: #000;
      }

      .card-container {
        background-color: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(6px);
      }
    }
  </style>
</head>

<body
  class="min-h-screen flex flex-col items-center justify-center text-center"
  style="
    background-image: url('fondobodalogin.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  "
>
  <!-- TEXTO SUPERIOR -->
  <div class="boda-text mb-10 leading-tight">
    Bienvenidos a<br>nuestra boda
  </div>

  <!-- TARJETA CENTRAL -->
  <div class="card-container bg-white bg-opacity-80 p-6 rounded-2xl shadow-lg w-full max-w-sm backdrop-blur-sm">
    <h1 class="text-xl font-semibold mb-4 text-center">
      Ingresa un nombre y un apellido de la persona que recibió la invitación
    </h1>

    <input
      id="nombre"
      type="text"
      placeholder="Nombre"
      class="w-full p-2 border rounded-xl mb-2 uppercase focus:outline-none focus:ring"
      oninput="this.value = this.value.toUpperCase()"
      autocomplete="given-name"
    />

    <input
      id="apellido"
      type="text"
      placeholder="Apellido"
      class="w-full p-2 border rounded-xl mb-2 uppercase focus:outline-none focus:ring"
      oninput="this.value = this.value.toUpperCase()"
      autocomplete="family-name"
    />

    <button
      onclick="redirigir()"
      class="w-full bg-black text-white py-2 rounded-xl hover:opacity-90 transition"
    >
      Ir a
    </button>

    <p id="mensaje" class="text-sm mt-3 text-center"></p>
  </div>

  <!-- TEXTO INFERIOR -->
  <div class="boda-text mt-10">
    Jennifer y Rogelio
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRg6mPHB4nNZ6WX9q4SmmlEJGdYP3inKKYLdOWgcN3nUtksf2mjU1Fb1XQ6yjHRz8XQg/exec";

    function normalizarTexto(texto) {
      return texto
        .trim()
        .toUpperCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "") // quita tildes
        .replace(/\s+/g, " ");           // unifica espacios
    }

    async function redirigir() {
      const inputNombre = document.getElementById("nombre");
      const inputApellido = document.getElementById("apellido");
      const mensaje = document.getElementById("mensaje");

      const nombre = normalizarTexto(inputNombre.value);
      const apellido = normalizarTexto(inputApellido.value);

      if (!nombre || !apellido) {
        mensaje.textContent = "Por favor ingresa un nombre y un apellido.";
        mensaje.className = "text-sm mt-3 text-center text-red-600";
        return;
      }

      if (nombre.includes(" ") || apellido.includes(" ")) {
        mensaje.textContent = "Ingresa solo 1 nombre y 1 apellido.";
        mensaje.className = "text-sm mt-3 text-center text-red-600";
        return;
      }

      try {
        mensaje.textContent = "Validando acceso...";
        mensaje.className = "text-sm mt-3 text-center text-gray-700";

        const params = new URLSearchParams({
          nombre,
          apellido
        });

        const resp = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`, {
          method: "GET"
        });

        const data = await resp.json();

        if (!data.ok) {
          mensaje.textContent = data.error || "No autorizado.";
          mensaje.className = "text-sm mt-3 text-center text-red-600";
          inputNombre.value = "";
          inputApellido.value = "";
          inputNombre.focus();
          return;
        }

        mensaje.textContent = "Nombre válido. Redirigiendo...";
        mensaje.className = "text-sm mt-3 text-center text-green-600";

        setTimeout(() => {
          window.location.href = data.url;
        }, 800);

      } catch (error) {
        console.error("Error al validar:", error);
        mensaje.textContent = "No fue posible validar el acceso.";
        mensaje.className = "text-sm mt-3 text-center text-red-600";
      }
    }

    document.getElementById("nombre").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        document.getElementById("apellido").focus();
      }
    });

    document.getElementById("apellido").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        redirigir();
      }
    });
  </script>
</body>
</html>
